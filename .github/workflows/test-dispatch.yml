name: Test Build Dispatch

on:
  workflow_dispatch:
    inputs:
      description:
        description: "What should testers focus on?"
        required: true
        type: string
      variant:
        description: "APK variant to build"
        required: true
        default: "foss"
        type: choice
        options:
          - foss
          - gms
      status:
        description: "Build status"
        required: true
        default: "stable"
        type: choice
        options:
          - stable
          - wip

permissions:
  contents: read

jobs:
  build:
    name: Build Canary APK (${{ inputs.variant }})
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_KEY }}
          cache-cleanup: on-success

      - name: Setup and Generate Protobuf
        uses: ./.github/actions/setup-protobuf

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Change Package Name and App Label for Canary Build
        run: |
          sed -i 's/applicationId = "com.metrolist.music"/applicationId = "com.metrolist.music.canary"/' app/build.gradle.kts
          sed -i 's|<string name="app_name">Metrolist</string>|<string name="app_name">Metrolist Canary</string>|' app/src/main/res/values/app_name.xml

      - name: Build Release APK
        id: build
        run: |
          BUILD_START=$(date +%s)
          echo "build_start=$BUILD_START" >> $GITHUB_OUTPUT
          VARIANT_NAME=$(echo "${{ inputs.variant }}" | sed 's/./\u&/')
          ./gradlew --console=plain assemble${VARIANT_NAME}Release --warning-mode summary -x lint -x lint${VARIANT_NAME}Release
        env:
          PULL_REQUEST: "false"
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}

      - name: Sign APK
        uses: ilharp/sign-android-release@v2.0.0
        with:
          releaseDir: app/build/outputs/apk/${{ inputs.variant }}/release/
          signingKey: ${{ secrets.KEYSTORE }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: 35.0.0

      - name: Move signed APK
        run: |
          OUTPUT_DIR="app/build/outputs/apk/${{ inputs.variant }}/release"
          mkdir -p "$OUTPUT_DIR/out"
          find "$OUTPUT_DIR" -name "*-signed.apk" -o -name "*-unsigned-signed.apk" | xargs -I{} mv {} "$OUTPUT_DIR/out/metrolist-canary-${{ inputs.variant }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrolist-canary-${{ inputs.variant }}
          path: app/build/outputs/apk/${{ inputs.variant }}/release/out/*.apk
          retention-days: 14

      - name: Collect build metadata
        id: meta
        run: |
          APK_PATH=$(find app/build/outputs/apk/${{ inputs.variant }}/release/out -name "*.apk" | head -1)
          APK_BYTES=$(stat -c%s "$APK_PATH")
          APK_MB=$(echo "scale=1; $APK_BYTES / 1048576" | bc)
          echo "apk_size=${APK_MB} MB" >> $GITHUB_OUTPUT

          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*versionName = "\(.*\)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | head -1 | grep -o '[0-9]*')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

          BUILD_END=$(date +%s)
          BUILD_START=${{ steps.build.outputs.build_start }}
          DURATION=$(( (BUILD_END - BUILD_START) / 60 ))
          echo "duration=${DURATION}m" >> $GITHUB_OUTPUT

          COMMIT_MSG=$(git log -1 --pretty=%s)
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT

      - name: Send Discord notification
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BRANCH="${{ github.ref_name }}"
          ACTOR="${{ github.actor }}"
          VARIANT="${{ inputs.variant }}"
          DESCRIPTION="${{ inputs.description }}"
          APK_SIZE="${{ steps.meta.outputs.apk_size }}"
          VERSION_NAME="${{ steps.meta.outputs.version_name }}"
          VERSION_CODE="${{ steps.meta.outputs.version_code }}"
          DURATION="${{ steps.meta.outputs.duration }}"
          COMMIT_MSG="${{ steps.meta.outputs.commit_msg }}"
          STATUS="${{ inputs.status }}"

          if [ "$STATUS" = "wip" ]; then
            STATUS_LABEL="Work in Progress"
            EMBED_COLOR=15105570
          else
            STATUS_LABEL="Ready for Testing"
            EMBED_COLOR=0
          fi

          BODY=$(printf '`%s` **%s** `%s · %s` `%s` · `%s`\n\n%s' \
            "$SHORT_SHA" "$BRANCH" "$VERSION_NAME" "$VERSION_CODE" "$VARIANT" "$APK_SIZE" \
            "$DESCRIPTION")

          PAYLOAD=$(jq -n \
            --arg content "<@&1441099959662284901>" \
            --arg title "Metrolist Canary — $STATUS_LABEL" \
            --arg body "$BODY" \
            --arg download "[Download from GitHub Actions — expires in 14 days]($RUN_URL)" \
            --arg footer "Triggered by $ACTOR · Built in ${DURATION}m · Metrolist Canary" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson color "$EMBED_COLOR" \
            '{
              content: $content,
              embeds: [{
                title: $title,
                description: $body,
                color: $color,
                fields: [
                  { name: "Download", value: $download }
                ],
                footer: { text: $footer },
                timestamp: $timestamp
              }]
            }')

          curl -s -X POST "${{ secrets.DISCORD_TESTING_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

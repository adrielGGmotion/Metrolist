name: Canary Build

on:
  workflow_dispatch:
    inputs:
      test_focus:
        description: 'What to test'
        required: true
        type: string
      variant:
        description: 'Variant to build'
        required: true
        default: 'both'
        type: choice
        options:
          - foss
          - gms
          - both
      status:
        description: 'Build Status'
        required: true
        default: 'Work in progress'
        type: choice
        options:
          - 'Work in progress'
          - 'Ready for production'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [foss, gms]
        include:
          - variant: foss
            variantName: Foss
          - variant: gms
            variantName: Gms
        exclude:
          - variant: ${{ github.event.inputs.variant == 'foss' && 'gms' || (github.event.inputs.variant == 'gms' && 'foss' || 'none') }}
    
    outputs:
      foss_size: ${{ steps.set_foss_size.outputs.size }}
      gms_size: ${{ steps.set_gms_size.outputs.size }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: on-success

      - name: Setup and Generate Protobuf
        uses: ./.github/actions/setup-protobuf

      - name: Prepare Canary Identity
        run: |
          # Change Package Name
          sed -i 's/applicationId = "com.metrolist.music"/applicationId = "com.metrolist.music.canary"/g' app/build.gradle.kts
          
          # Change App Name
          sed -i 's/<string name="app_name">Metrolist<\/string>/<string name="app_name">Metrolist Canary<\/string>/g' app/src/main/res/values/app_name.xml

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew --console=plain assemble${{ matrix.variantName }}Release
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}

      - name: Sign APK
        uses: ilharp/sign-android-release@v2.0.0
        with:
          releaseDir: app/build/outputs/apk/${{ matrix.variant }}/release/
          signingKey: ${{ secrets.KEYSTORE }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: 35.0.0

      - name: Prepare Artifact
        id: prepare_artifact
        run: |
          OUTPUT_DIR="app/build/outputs/apk/${{ matrix.variant }}/release"
          SIGNED_APK=$(find "$OUTPUT_DIR" -name "*-signed.apk" -o -name "*-unsigned-signed.apk" | head -n 1)
          
          if [ -z "$SIGNED_APK" ]; then
            echo "::error::No signed APK found!"
            exit 1
          fi
          
          APK_NAME="Metrolist-Canary-${{ matrix.variant }}.apk"
          cp "$SIGNED_APK" "$APK_NAME"
          
          # Calculate Size in MB
          SIZE_BYTES=$(stat -c%s "$APK_NAME")
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)
          
          echo "apk_path=$APK_NAME" >> $GITHUB_OUTPUT
          echo "apk_size=${SIZE_MB} MB" >> $GITHUB_OUTPUT

      - name: Set FOSS Size
        id: set_foss_size
        if: matrix.variant == 'foss'
        run: echo "size=${{ steps.prepare_artifact.outputs.apk_size }}" >> $GITHUB_OUTPUT

      - name: Set GMS Size
        id: set_gms_size
        if: matrix.variant == 'gms'
        run: echo "size=${{ steps.prepare_artifact.outputs.apk_size }}" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: Metrolist-Canary-${{ matrix.variant }}
          path: ${{ steps.prepare_artifact.outputs.apk_path }}

  notify:
    needs: build
    runs-on: ubuntu-latest
    if: always() && !cancelled() && (needs.build.result == 'success')
    steps:
      - name: Send Discord Notification
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CANARY_CHANNEL_ID }}
          TEST_FOCUS: ${{ github.event.inputs.test_focus }}
          STATUS: ${{ github.event.inputs.status }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          BUILD_OUTPUTS: ${{ toJSON(needs.build.outputs) }}
        run: |
          if [ -z "$DISCORD_BOT_TOKEN" ]; then
            echo "::error::DISCORD_BOT_TOKEN is missing. Check your repository secrets."
            exit 1
          fi

          # Safely get sizes from build outputs
          FOSS_SIZE=$(echo "$BUILD_OUTPUTS" | jq -r '.foss_size // empty')
          GMS_SIZE=$(echo "$BUILD_OUTPUTS" | jq -r '.gms_size // empty')
          
          VARIANTS_MD=""
          [ -n "$FOSS_SIZE" ] && VARIANTS_MD="${VARIANTS_MD}- **FOSS:** __${FOSS_SIZE}__\n"
          [ -n "$GMS_SIZE" ] && VARIANTS_MD="${VARIANTS_MD}- **GMS:** __${GMS_SIZE}__\n"

          # Build JSON payload safely with jq
          PAYLOAD=$(jq -n \
            --arg status "$STATUS" \
            --arg test_focus "$TEST_FOCUS" \
            --arg actor "$ACTOR" \
            --arg variants "$VARIANTS_MD" \
            --arg url "$SERVER_URL/$REPO/actions/runs/$RUN_ID" \
            '{
              flags: 32768,
              components: [
                { type: 10, content: "<@1441099959662284901>" },
                {
                  type: 17,
                  components: [
                    { type: 10, content: ("__**METROLIST CANARY BUILD**__\n**Status:** *" + $status + "*") },
                    { type: 10, content: ("**WHAT TO TEST**\n> " + $test_focus) },
                    { type: 10, content: ("**BUILD DETAILS**\n- **User:** @" + $actor + "\n- **Package Name:** `com.metrolist.music.canary`") },
                    { type: 10, content: ("**VARIANTS BUILDED**\n" + $variants) },
                    {
                      type: 1,
                      components: [
                        { type: 2, style: 5, label: "Open Workflow Run", url: $url }
                      ]
                    }
                  ]
                }
              ]
            }')

          curl -X POST "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_ID/messages" \
               -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
               -H "Content-Type: application/json" \
               -d "$PAYLOAD"

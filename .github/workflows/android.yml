name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle
        
        - name: Decode Keystore
  env:
    DEBUG_KEYSTORE: ${{ secrets.DEBUG_KEYSTORE }}
  run: |
    echo $DEBUG_KEYSTORE > app/persistent-debug.keystore.base64
    base64 -d app/persistent-debug.keystore.base64 > app/persistent-debug.keystore
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build with Gradle
      run: ./gradlew build
